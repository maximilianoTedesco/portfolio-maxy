<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#020617; color:white; padding:40px; }
    h1 { color:#22d3ee; font-size:42px; }
    input { width:100%; padding:14px; margin:10px 0; border-radius:8px; border:none; box-sizing:border-box; }
    button { padding:12px 20px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
    .login { max-width:420px; background:#0f172a; padding:30px; border-radius:16px; }
    .btn { background:#22d3ee; color:#020617; }
    .logout { background:#ef4444; color:white; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; background:#0f172a; border-radius:12px; overflow:hidden; margin-top:20px; }
    th, td { padding:14px; border-bottom:1px solid #334155; text-align:left; vertical-align:top; }
    th { background:#1e293b; color:#22d3ee; }
    tr:hover { background:#1e293b; }
    #adminPanel { display:none; }
  </style>
</head>

<body>

<div id="loginBox" class="login">
  <h1>Admin Login</h1>
  <p>Entre com o e-mail e senha criados no Supabase.</p>

  <input id="email" type="email" placeholder="E-mail do administrador">
  <input id="password" type="password" placeholder="Senha do administrador">

  <button class="btn" onclick="login()">Entrar</button>

  <p id="loginError" style="color:#ef4444;"></p>
</div>

<div id="adminPanel">
  <h1>Painel Administrativo</h1>
  <p>Contatos recebidos pelo portfólio.</p>

  <button class="logout" onclick="logout()">Sair</button>

  <table>
    <thead>
      <tr>
        <th>Data/Hora</th>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Telefone</th>
        <th>Tipo de vaga</th>
        <th>Mensagem</th>
      </tr>
    </thead>
    <tbody id="contactsTable">
      <tr><td colspan="6">Carregando contatos...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const loginBox = document.getElementById("loginBox");
const adminPanel = document.getElementById("adminPanel");
const table = document.getElementById("contactsTable");
const loginError = document.getElementById("loginError");

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    loginError.innerText = "Login inválido. Verifique e-mail e senha.";
    return;
  }

  loginBox.style.display = "none";
  adminPanel.style.display = "block";
  loadContacts();
}

async function logout() {
  await client.auth.signOut();
  window.location.reload();
}

async function checkSession() {
  const { data } = await client.auth.getSession();

  if (data.session) {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    loadContacts();
  }
}

async function loadContacts() {
  const { data, error } = await client
    .from("contacts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    table.innerHTML = `<tr><td colspan="6">Erro: ${error.message}</td></tr>`;
    return;
  }

  if (!data || data.length === 0) {
    table.innerHTML = `<tr><td colspan="6">Nenhum contato encontrado.</td></tr>`;
    return;
  }

  table.innerHTML = data.map(c => `
    <tr>
      <td>${c.created_at ? new Date(c.created_at).toLocaleString("pt-BR") : ""}</td>
      <td>${c.name || ""}</td>
      <td>${c.email || ""}</td>
      <td>${c.phone || ""}</td>
      <td>${c.job_type || ""}</td>
      <td>${c.message || ""}</td>
    </tr>
  `).join("");
}

checkSession();
</script>

</body>
</html>
