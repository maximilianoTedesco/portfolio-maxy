<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }

.container { max-width:1100px; margin:40px auto; padding:20px; }

.login { max-width:400px; margin:100px auto; background:#fff; padding:30px; border-radius:10px; }

input, select, button {
  width:100%; padding:10px; margin-top:10px;
}

button { background:#111827; color:#fff; border:none; cursor:pointer; }

.top { display:flex; justify-content:space-between; align-items:center; }

table { width:100%; background:#fff; margin-top:20px; border-collapse:collapse; }

th, td { padding:12px; border-bottom:1px solid #eee; }

th { background:#111827; color:#fff; }

.status {
  padding:5px 10px;
  border-radius:20px;
  color:#fff;
  font-size:12px;
}

.novo { background:red; }
.lido { background:orange; }
.respondido { background:green; }

.btn-ver { background:#2563eb; }
.btn-excluir { background:#dc2626; margin-top:6px; }

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#fff;
  padding:20px;
  max-width:500px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="login" class="login">
  <h2>Login Admin</h2>
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="admin" class="container" style="display:none;">

  <div class="top">
    <h1>Painel de Mensagens</h1>
    <button onclick="logout()" style="background:#dc2626;">Sair</button>
  </div>

  <input id="busca" placeholder="Buscar..." oninput="filtrar()">

  <select id="filtro" onchange="filtrar()">
    <option value="todos">Todos</option>
    <option value="novo">Novo</option>
    <option value="lido">Lido</option>
    <option value="respondido">Respondido</option>
  </select>

  <div id="conteudo">Carregando mensagens...</div>

</div>

<div id="modal" class="modal" onclick="fecharModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>Mensagem</h3>
    <p id="textoModal"></p>
    <button onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script>

const SUPABASE_URL = "https://kdgjfzsimvtgckialfpe.supabase.co";
const SUPABASE_KEY = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";
const ADMIN_PASSWORD = "LiSa-2011";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let dados = [];

function login(){
  if(document.getElementById("senha").value === ADMIN_PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    carregar();
  } else {
    alert("Senha incorreta");
  }
}

function logout(){
  location.reload();
}

async function carregar(){

  const { data, error } = await supabaseClient
    .from("contacts")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.log(error);
    document.getElementById("conteudo").innerHTML = "Erro ao carregar mensagens";
    return;
  }

  dados = data || [];
  render(dados);
}

function filtrar(){

  let busca = document.getElementById("busca").value.toLowerCase();
  let filtro = document.getElementById("filtro").value;

  let filtrado = dados.filter(m => {

    let texto = (
      (m.name || "") +
      (m.email || "") +
      (m.phone || "") +
      (m.message || "")
    ).toLowerCase();

    let statusAtual = m.status || "novo";

    let okBusca = texto.includes(busca);
    let okStatus = filtro === "todos" || statusAtual === filtro;

    return okBusca && okStatus;
  });

  render(filtrado);
}

function render(lista){

  if(lista.length === 0){
    document.getElementById("conteudo").innerHTML = "Sem mensagens";
    return;
  }

  let html = `
    <table>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
  `;

  lista.forEach(m => {

    let status = m.status || "novo";
    let nome = m.name || "-";
    let email = m.email || "-";
    let mensagem = m.message || "-";

    html += `
      <tr>
        <td>${nome}</td>
        <td>${email}</td>

        <td>
          <span class="status ${status}">${status}</span>
          <select onchange="mudarStatus('${m.id}', this.value)">
            <option value="novo" ${status=="novo"?"selected":""}>novo</option>
            <option value="lido" ${status=="lido"?"selected":""}>lido</option>
            <option value="respondido" ${status=="respondido"?"selected":""}>respondido</option>
          </select>
        </td>

        <td>
          <button class="btn-ver" onclick="abrir('${m.id}', \`${mensagem}\`)">Ver</button>
          <button class="btn-excluir" onclick="excluir('${m.id}')">Excluir</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("conteudo").innerHTML = html;
}

async function mudarStatus(id, status){

  const { error } = await supabaseClient
    .from("contacts")
    .update({ status: status })
    .eq("id", id);

  if(error){
    alert("Erro ao atualizar status");
    console.log(error);
    return;
  }

  dados = dados.map(item => {
    if(String(item.id) === String(id)){
      return { ...item, status: status };
    }
    return item;
  });

  filtrar();
}

async function abrir(id, msg){

  document.getElementById("textoModal").innerText = msg;
  document.getElementById("modal").style.display = "flex";

  const { error } = await supabaseClient
    .from("contacts")
    .update({ status: "lido" })
    .eq("id", id);

  if(error){
    console.log(error);
    return;
  }

  dados = dados.map(item => {
    if(String(item.id) === String(id)){
      return { ...item, status: "lido" };
    }
    return item;
  });

  filtrar();
}

async function excluir(id){

  const confirmar = confirm("Tem certeza que deseja excluir esta mensagem?");

  if(!confirmar) return;

  const { error } = await supabaseClient
    .from("contacts")
    .delete()
    .eq("id", id);

  if(error){
    alert("Erro ao excluir. Verifique a policy DELETE no Supabase.");
    console.log(error);
    return;
  }

  dados = dados.filter(item => String(item.id) !== String(id));
  filtrar();
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
