<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Portfólio</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }

    h1, h2 {
      margin-bottom: 20px;
      color: #38bdf8;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input, textarea {
      background: #1e293b;
      color: #fff;
      border: 1px solid #334155;
    }

    button {
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .logout {
      background: #ef4444;
      color: #fff;
      max-width: 150px;
    }

    .logout:hover {
      background: #dc2626;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      gap: 15px;
    }

    .message {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .message p {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .message strong {
      color: #38bdf8;
    }

    .status {
      margin-top: 10px;
      color: #facc15;
      font-size: 14px;
    }

    .empty {
      color: #94a3b8;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .logout {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- LOGIN -->
    <div id="loginBox" class="card">
      <h1>Login Admin</h1>

      <input type="email" id="email" placeholder="E-mail" autocomplete="email" />
      <input type="password" id="password" placeholder="Senha" autocomplete="current-password" />

      <button id="loginBtn">Entrar</button>

      <p id="loginStatus" class="status"></p>
    </div>

    <!-- PAINEL -->
    <div id="adminBox" class="card hidden">
      <div class="topbar">
        <h2>Mensagens recebidas</h2>
        <button id="logoutBtn" class="logout">Sair</button>
      </div>

      <button id="refreshBtn">Atualizar mensagens</button>

      <div id="messagesList"></div>
    </div>

  </div>

  <script>
    const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
    const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

    const TABLE_NAME = "message";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const loginStatus = document.getElementById("loginStatus");
    const messagesList = document.getElementById("messagesList");

    function showLogin() {
      loginBox.classList.remove("hidden");
      adminBox.classList.add("hidden");
    }

    function showAdmin() {
      loginBox.classList.add("hidden");
      adminBox.classList.remove("hidden");
      loadMessages();
    }

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error(error);
        showLogin();
        return;
      }

      if (data.session) {
        showAdmin();
      } else {
        showLogin();
      }
    }

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      loginStatus.textContent = "";

      if (!email || !password) {
        loginStatus.textContent = "Informe o e-mail e a senha.";
        return;
      }

      loginBtn.textContent = "Entrando...";
      loginBtn.disabled = true;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      loginBtn.textContent = "Entrar";
      loginBtn.disabled = false;

      if (error) {
        console.error(error);
        loginStatus.textContent = "Erro no login: " + error.message;
        return;
      }

      if (data.session) {
        showAdmin();
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      showLogin();
    });

    refreshBtn.addEventListener("click", () => {
      loadMessages();
    });

    async function loadMessages() {
      messagesList.innerHTML = "<p class='empty'>Carregando mensagens...</p>";

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        messagesList.innerHTML = "<p class='empty'>Erro ao carregar mensagens: " + error.message + "</p>";
        return;
      }

      if (!data || data.length === 0) {
        messagesList.innerHTML = "<p class='empty'>Nenhuma mensagem encontrada.</p>";
        return;
      }

      messagesList.innerHTML = "";

      data.forEach((msg) => {
        const div = document.createElement("div");
        div.className = "message";

        div.innerHTML = `
          <p><strong>Nome:</strong> ${msg.name || "Não informado"}</p>
          <p><strong>E-mail:</strong> ${msg.email || "Não informado"}</p>
          <p><strong>Telefone:</strong> ${msg.phone || "Não informado"}</p>
          <p><strong>Serviço:</strong> ${msg.job_type || "Não informado"}</p>
          <p><strong>Mensagem:</strong> ${msg.message || "Sem mensagem"}</p>
          <p><strong>Data:</strong> ${msg.created_at ? new Date(msg.created_at).toLocaleString("pt-BR") : "Sem data"}</p>
        `;

        messagesList.appendChild(div);
      });
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) {
        showAdmin();
      } else {
        showLogin();
      }
    });

    checkSession();
  </script>
</body>
</html>
