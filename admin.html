<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #22d3ee;
      font-size: 42px;
    }

    input, select {
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin: 5px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
      font-size: 16px;
    }

    .btn {
      background: #22d3ee;
      color: #020617;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .login {
      max-width: 420px;
      background: #0f172a;
      padding: 30px;
      border-radius: 16px;
    }

    .filters {
      margin: 25px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #334155;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #1e293b;
      color: #22d3ee;
    }

    tr:hover {
      background: #1e293b;
    }

    #adminPanel {
      display: none;
    }

    #error {
      color: #ef4444;
    }
  </style>
</head>

<body>

<div id="loginBox" class="login">
  <h1>Admin Login</h1>
  <p>Entre com o e-mail e senha cadastrados no Supabase.</p>

  <input id="email" type="email" placeholder="E-mail do administrador">
  <input id="password" type="password" placeholder="Senha do administrador">

  <br>
  <button class="btn" onclick="login()">Entrar</button>

  <p id="error"></p>
</div>

<div id="adminPanel">
  <h1>Painel Administrativo</h1>
  <p>Contatos recebidos pelo portfólio.</p>

  <div class="filters">
    <input type="text" id="search" placeholder="Buscar nome ou e-mail">

    <select id="filter">
      <option value="">Todas as vagas</option>
    </select>

    <button class="btn" onclick="exportCSV()">Exportar CSV</button>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Data/Hora</th>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Telefone</th>
        <th>Tipo de vaga</th>
        <th>Mensagem</th>
      </tr>
    </thead>
    <tbody id="contactsTable">
      <tr><td colspan="6">Carregando contatos...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
const supabaseKey = "SUA_PUBLIC_KEY";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const tableBody = document.getElementById("tableBody");
const searchInput = document.getElementById("search");
const filterSelect = document.getElementById("filter");

let contacts = [];

// 🔹 carregar dados iniciais
async function loadContacts() {
  const { data } = await client
    .from("contacts")
    .select("*")
    .order("created_at", { ascending: false });

  contacts = data || [];
  renderTable();
}

// 🔹 renderizar tabela
function renderTable() {
  const search = searchInput.value.toLowerCase();
  const filter = filterSelect.value;

  const filtered = contacts.filter(c => {
    const matchSearch =
      c.name?.toLowerCase().includes(search) ||
      c.email?.toLowerCase().includes(search);

    const matchFilter =
      filter === "Todos" || c.job_type === filter;

    return matchSearch && matchFilter;
  });

  tableBody.innerHTML = "";

  filtered.forEach(c => {
    const row = `
      <tr>
        <td>${new Date(c.created_at).toLocaleString()}</td>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone}</td>
        <td>${c.job_type}</td>
        <td>${c.message}</td>
      </tr>
    `;
    tableBody.innerHTML += row;
  });
}

// 🔹 realtime (a mágica acontece aqui)
client
  .channel('realtime-contacts')
  .on(
    'postgres_changes',
    { event: '*', schema: 'public', table: 'contacts' },
    (payload) => {
      console.log("Mudança em tempo real:", payload);

      if (payload.eventType === "INSERT") {
        contacts.unshift(payload.new);
      }

      renderTable();
    }
  )
  .subscribe();

// 🔹 eventos
searchInput.addEventListener("input", renderTable);
filterSelect.addEventListener("change", renderTable);

// iniciar
loadContacts();
</script>

</body>
</html>
