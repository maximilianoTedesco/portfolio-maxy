<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #22d3ee;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #1e293b;
      color: #22d3ee;
    }

    tr:hover {
      background: #1e293b;
    }

    a {
      color: #22d3ee;
    }
  </style>
</head>

<body>

<h1>Painel Administrativo</h1>
<p>Contatos recebidos pelo portfólio.</p>

<table>
  <thead>
    <tr>
      <th>Data/Hora</th>
      <th>Nome</th>
      <th>E-mail</th>
      <th>Telefone</th>
      <th>Tipo de vaga</th>
      <th>Mensagem</th>
    </tr>
  </thead>
  <tbody id="contactsTable">
    <tr>
      <td colspan="6">Carregando contatos...</td>
    </tr>
  </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
  const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

  const client = window.supabase.createClient(supabaseUrl, supabaseKey);
  const table = document.getElementById("contactsTable");

  async function loadContacts() {
    const { data, error } = await client
      .from("contatos")
      .select("*")
      .order("criado_em", { ascending: false });

    if (error) {
      table.innerHTML = `
        <tr>
          <td colspan="6">Erro ao carregar contatos.</td>
        </tr>
      `;
      console.log(error);
      return;
    }

    if (!data || data.length === 0) {
      table.innerHTML = `
        <tr>
          <td colspan="6">Nenhum contato encontrado.</td>
        </tr>
      `;
      return;
    }

    table.innerHTML = data.map(contact => `
      <tr>
        <td>${contact.criado_em ? new Date(contact.criado_em).toLocaleString("pt-BR") : ""}</td>
        <td>${contact.name || ""}</td>
        <td>${contact.email || ""}</td>
        <td>${contact.phone || ""}</td>
        <td>${contact.tipo_de_trabalho || ""}</td>
        <td>${contact.mensagem || ""}</td>
      </tr>
    `).join("");
  }

  loadContacts();
</script>

</body>
</html>
