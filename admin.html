<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #22d3ee;
      font-size: 36px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin: 5px;
      font-size: 14px;
      outline: none;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
      transition: 0.2s ease;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn {
      background: #22d3ee;
      color: #020617;
    }

    .btn:hover:not(:disabled) {
      background: #67e8f9;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .logout:hover:not(:disabled) {
      background: #f87171;
    }

    .login {
      max-width: 400px;
      background: #0f172a;
      padding: 25px;
      border-radius: 12px;
      margin: 80px auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .login input {
      width: 100%;
      margin: 8px 0;
    }

    .filters {
      margin: 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #0f172a;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #1e293b;
      color: #22d3ee;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover {
      background: #1e293b;
    }

    tbody tr {
      cursor: pointer;
    }

    #adminPanel {
      display: none;
    }

    #error {
      color: #ef4444;
      margin-top: 10px;
    }

    #status {
      color: #94a3b8;
      margin: 10px 0;
      font-size: 15px;
    }

    .message-cell {
      max-width: 350px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loader {
      width: 42px;
      height: 42px;
      border: 4px solid #334155;
      border-top: 4px solid #22d3ee;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .empty-state {
      text-align: center;
      padding: 35px;
      color: #cbd5e1;
      font-size: 16px;
    }

    mark {
      background: #22d3ee;
      color: #020617;
      padding: 1px 3px;
      border-radius: 3px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 760px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 25px 70px rgba(0,0,0,0.55);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: #ef4444;
      color: #fff;
      border-radius: 6px;
      padding: 7px 11px;
    }

    .modal-close:hover {
      background: #f87171;
    }

    .modal h2 {
      color: #22d3ee;
      margin-top: 0;
      margin-bottom: 18px;
      padding-right: 80px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 18px;
      margin-bottom: 18px;
    }

    .modal-info {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1e293b;
    }

    .modal-info strong {
      color: #22d3ee;
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .modal-message-title {
      color: #22d3ee;
      margin: 12px 0 8px;
      font-weight: bold;
    }

    .modal-message {
      background: #020617;
      border: 1px solid #1e293b;
      padding: 14px;
      border-radius: 8px;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }

      .filters input,
      .filters select,
      .filters button {
        width: 100%;
      }

      .modal-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div id="loginBox" class="login">
    <h1>Admin Login</h1>

    <input id="email" type="email" placeholder="E-mail" autocomplete="email" />
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password" />

    <button id="loginBtn" class="btn" onclick="login()">Entrar</button>

    <p id="error"></p>
  </div>

  <div id="adminPanel">
    <h1>Painel Administrativo</h1>

    <div class="filters">
      <input type="text" id="search" placeholder="Buscar por nome, email, telefone ou mensagem" />

      <select id="filter">
        <option value="">Todas as vagas</option>
      </select>

      <button class="btn action-btn" onclick="loadMessages()">Atualizar</button>
      <button class="btn action-btn" onclick="exportCSV()">Exportar CSV</button>
      <button class="logout action-btn" onclick="logout()">Sair</button>
    </div>

    <p id="status"></p>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Vaga</th>
            <th>Mensagem</th>
          </tr>
        </thead>

        <tbody id="messagesTable">
          <tr>
            <td colspan="6">
              <div class="loader"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="messageModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">Fechar</button>

      <h2>Detalhes da Mensagem</h2>

      <div class="modal-grid">
        <div class="modal-info">
          <strong>Data</strong>
          <span id="modalDate">-</span>
        </div>

        <div class="modal-info">
          <strong>Nome</strong>
          <span id="modalName">-</span>
        </div>

        <div class="modal-info">
          <strong>Email</strong>
          <span id="modalEmail">-</span>
        </div>

        <div class="modal-info">
          <strong>Telefone</strong>
          <span id="modalPhone">-</span>
        </div>

        <div class="modal-info">
          <strong>Vaga</strong>
          <span id="modalJob">-</span>
        </div>
      </div>

      <div class="modal-message-title">Mensagem completa</div>
      <div id="modalMessage" class="modal-message">-</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
    const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    const loginBox = document.getElementById("loginBox");
    const adminPanel = document.getElementById("adminPanel");
    const table = document.getElementById("messagesTable");
    const errorBox = document.getElementById("error");
    const statusBox = document.getElementById("status");
    const searchInput = document.getElementById("search");
    const filterSelect = document.getElementById("filter");
    const loginBtn = document.getElementById("loginBtn");
    const modal = document.getElementById("messageModal");

    let messages = [];
    let filteredMessages = [];
    let debounceTimer;

    function safe(value) {
      if (value === null || value === undefined || value === "") return "-";

      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function plain(value) {
      if (value === null || value === undefined || value === "") return "-";
      return String(value);
    }

    function formatDate(value) {
      if (!value) return "-";

      const date = new Date(value);

      if (isNaN(date.getTime())) return "-";

      return date.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function setButtonsLoading(isLoading) {
      const buttons = document.querySelectorAll(".action-btn");

      buttons.forEach(button => {
        button.disabled = isLoading;
      });
    }

    function showLoader() {
      table.innerHTML = `
        <tr>
          <td colspan="6">
            <div class="loader"></div>
          </td>
        </tr>
      `;
    }

    function highlight(text, search) {
      const cleanText = safe(text);

      if (!search) return cleanText;

      const escapedSearch = search.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(`(${escapedSearch})`, "gi");

      return cleanText.replace(regex, "<mark>$1</mark>");
    }

    async function login() {
      errorBox.innerText = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        errorBox.innerText = "Informe e-mail e senha.";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerText = "Entrando...";

      const { error } = await client.auth.signInWithPassword({
        email,
        password
      });

      loginBtn.disabled = false;
      loginBtn.innerText = "Entrar";

      if (error) {
        errorBox.innerText = "Login inválido. Verifique e-mail e senha.";
        return;
      }

      loginBox.style.display = "none";
      adminPanel.style.display = "block";

      await loadMessages();
    }

    async function logout() {
      setButtonsLoading(true);
      await client.auth.signOut();
      window.location.reload();
    }

    async function checkSession() {
      const { data, error } = await client.auth.getSession();

      if (error) {
        console.error(error);
        return;
      }

      if (data.session) {
        loginBox.style.display = "none";
        adminPanel.style.display = "block";
        await loadMessages();
      }
    }

    async function loadMessages() {
      setButtonsLoading(true);
      showLoader();
      statusBox.innerText = "Carregando mensagens...";

      const { data, error } = await client
        .from("contacts")
        .select("id, name, email, phone, job_type, message, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);

        statusBox.innerText = "Erro ao carregar mensagens.";
        table.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">
              Não foi possível carregar os dados. Verifique a tabela contacts e as políticas RLS no Supabase.
            </td>
          </tr>
        `;

        setButtonsLoading(false);
        return;
      }

      messages = data || [];

      populateFilter();
      renderMessages();

      setButtonsLoading(false);
    }

    function populateFilter() {
      const currentValue = filterSelect.value;

      filterSelect.innerHTML = `<option value="">Todas as vagas</option>`;

      const jobs = [...new Set(messages.map(item => item.job_type).filter(Boolean))];

      jobs.forEach(job => {
        const option = document.createElement("option");
        option.value = job;
        option.textContent = job;
        filterSelect.appendChild(option);
      });

      filterSelect.value = currentValue;
    }

    function renderMessages() {
      const search = searchInput.value.toLowerCase().trim();
      const selectedJob = filterSelect.value;

      filteredMessages = messages.filter(item => {
        const text = [
          item.name,
          item.email,
          item.phone,
          item.job_type,
          item.message
        ].join(" ").toLowerCase();

        return text.includes(search) && (selectedJob === "" || item.job_type === selectedJob);
      });

      statusBox.innerText = `${filteredMessages.length} resultado(s) exibido(s) de ${messages.length} registro(s).`;

      if (filteredMessages.length === 0) {
        table.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">
              Nenhuma mensagem encontrada.
            </td>
          </tr>
        `;
        return;
      }

      table.innerHTML = filteredMessages.map((item, index) => `
        <tr onclick="openModal(${index})">
          <td>${safe(formatDate(item.created_at))}</td>
          <td>${highlight(item.name, search)}</td>
          <td>${highlight(item.email, search)}</td>
          <td>${highlight(item.phone, search)}</td>
          <td>${highlight(item.job_type, search)}</td>
          <td class="message-cell">${highlight(item.message, search)}</td>
        </tr>
      `).join("");
    }

    function openModal(index) {
      const item = filteredMessages[index];

      if (!item) return;

      document.getElementById("modalDate").innerText = formatDate(item.created_at);
      document.getElementById("modalName").innerText = plain(item.name);
      document.getElementById("modalEmail").innerText = plain(item.email);
      document.getElementById("modalPhone").innerText = plain(item.phone);
      document.getElementById("modalJob").innerText = plain(item.job_type);
      document.getElementById("modalMessage").innerText = plain(item.message);

      modal.classList.add("active");
    }

    function closeModal() {
      modal.classList.remove("active");
    }

    function exportCSV() {
      const dataToExport = filteredMessages.length ? filteredMessages : messages;

      if (!dataToExport.length) {
        alert("Não há mensagens para exportar.");
        return;
      }

      const rows = [
        ["Data", "Nome", "Email", "Telefone", "Vaga", "Mensagem"]
      ];

      dataToExport.forEach(item => {
        rows.push([
          formatDate(item.created_at),
          item.name || "",
          item.email || "",
          item.phone || "",
          item.job_type || "",
          item.message || ""
        ]);
      });

      const csv = rows
        .map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + csv], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "contatos.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);

      debounceTimer = setTimeout(() => {
        renderMessages();
      }, 300);
    });

    filterSelect.addEventListener("change", renderMessages);

    modal.addEventListener("click", event => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    checkSession();
  </script>

</body>
</html>
