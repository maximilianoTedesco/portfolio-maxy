<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #22d3ee;
      font-size: 36px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin: 5px;
      font-size: 14px;
      outline: none;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    .btn {
      background: #22d3ee;
      color: #020617;
    }

    .btn:hover {
      background: #67e8f9;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .logout:hover {
      background: #f87171;
    }

    .login {
      max-width: 400px;
      background: #0f172a;
      padding: 25px;
      border-radius: 12px;
      margin: 80px auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .login input {
      width: 100%;
      margin: 8px 0;
    }

    .filters {
      margin: 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .table-container {
      width: 100%;
      overflow-x: auto;
      background: #0f172a;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #1e293b;
      color: #22d3ee;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover {
      background: #1e293b;
    }

    #adminPanel {
      display: none;
    }

    #error {
      color: #ef4444;
      margin-top: 10px;
    }

    #status {
      color: #94a3b8;
      margin: 10px 0;
    }

    .message-cell {
      max-width: 350px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }

      .filters input,
      .filters select,
      .filters button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginBox" class="login">
    <h1>Admin Login</h1>

    <input id="email" type="email" placeholder="E-mail" autocomplete="email" />
    <input id="password" type="password" placeholder="Senha" autocomplete="current-password" />

    <button class="btn" onclick="login()">Entrar</button>

    <p id="error"></p>
  </div>

  <!-- PAINEL -->
  <div id="adminPanel">
    <h1>Painel Administrativo</h1>

    <div class="filters">
      <input type="text" id="search" placeholder="Buscar por nome, email, telefone ou mensagem" />

      <select id="filter">
        <option value="">Todas as vagas</option>
      </select>

      <button class="btn" onclick="loadMessages()">Atualizar</button>
      <button class="btn" onclick="exportCSV()">Exportar CSV</button>
      <button class="logout" onclick="logout()">Sair</button>
    </div>

    <p id="status"></p>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Vaga</th>
            <th>Mensagem</th>
          </tr>
        </thead>

        <tbody id="messagesTable">
          <tr>
            <td colspan="6">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
    const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    const loginBox = document.getElementById("loginBox");
    const adminPanel = document.getElementById("adminPanel");
    const table = document.getElementById("messagesTable");
    const errorBox = document.getElementById("error");
    const statusBox = document.getElementById("status");

    let messages = [];

    function safe(value) {
      if (value === null || value === undefined || value === "") return "-";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";

      const date = new Date(value);

      if (isNaN(date.getTime())) return "-";

      return date.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function login() {
      errorBox.innerText = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        errorBox.innerText = "Informe e-mail e senha.";
        return;
      }

      const { error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errorBox.innerText = "Login inválido. Verifique e-mail e senha.";
        return;
      }

      loginBox.style.display = "none";
      adminPanel.style.display = "block";

      await loadMessages();
    }

    async function logout() {
      await client.auth.signOut();
      window.location.reload();
    }

    async function checkSession() {
      const { data, error } = await client.auth.getSession();

      if (error) {
        console.error(error);
        return;
      }

      if (data.session) {
        loginBox.style.display = "none";
        adminPanel.style.display = "block";
        await loadMessages();
      }
    }

    async function loadMessages() {
      statusBox.innerText = "Carregando mensagens...";
      table.innerHTML = `
        <tr>
          <td colspan="6">Carregando...</td>
        </tr>
      `;

    const { data, error } = await client
      .from("contacts")
      .select("*")
      .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        statusBox.innerText = "Erro ao carregar mensagens.";
        table.innerHTML = `
          <tr>
            <td colspan="6">Não foi possível carregar os dados. Verifique a tabela message e as políticas RLS no Supabase.</td>
          </tr>
        `;
        return;
      }

      messages = data || [];

      populateFilter();
      renderMessages();

      statusBox.innerText = `${messages.length} mensagem(ns) encontrada(s).`;
    }

    function getJobValue(item) {
      return item.job_type || item.job || item.vaga || item.position || "";
    }

    function populateFilter() {
      const filter = document.getElementById("filter");
      const currentValue = filter.value;

      filter.innerHTML = `<option value="">Todas as vagas</option>`;

      const jobs = [...new Set(messages.map(getJobValue).filter(Boolean))];

      jobs.forEach(job => {
        const opt = document.createElement("option");
        opt.value = job;
        opt.textContent = job;
        filter.appendChild(opt);
      });

      filter.value = currentValue;
    }

    function renderMessages() {
      const search = document.getElementById("search").value.toLowerCase().trim();
      const selectedJob = document.getElementById("filter").value;

      const filtered = messages.filter(item => {
        const job = getJobValue(item);

        const text = [
          item.name,
          item.email,
          item.phone,
          item.message,
          job
        ].join(" ").toLowerCase();

        return text.includes(search) && (selectedJob === "" || job === selectedJob);
      });

      if (filtered.length === 0) {
        table.innerHTML = `
          <tr>
            <td colspan="6">Nenhuma mensagem encontrada.</td>
          </tr>
        `;
        return;
      }

      table.innerHTML = filtered.map(item => {
        const job = getJobValue(item);

        return `
          <tr>
            <td>${safe(formatDate(item.created_at))}</td>
            <td>${safe(item.name)}</td>
            <td>${safe(item.email)}</td>
            <td>${safe(item.phone)}</td>
            <td>${safe(job)}</td>
            <td class="message-cell">${safe(item.message)}</td>
          </tr>
        `;
      }).join("");
    }

    function exportCSV() {
      if (!messages.length) {
        alert("Não há mensagens para exportar.");
        return;
      }

      const rows = [
        ["Data", "Nome", "Email", "Telefone", "Vaga", "Mensagem"]
      ];

      messages.forEach(item => {
        rows.push([
          formatDate(item.created_at),
          item.name || "",
          item.email || "",
          item.phone || "",
          getJobValue(item),
          item.message || ""
        ]);
      });

      const csv = rows
        .map(row => row.map(value => `"${String(value).replaceAll('"', '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + csv], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = "mensagens.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    }

    document.getElementById("search").addEventListener("input", renderMessages);
    document.getElementById("filter").addEventListener("change", renderMessages);

    checkSession();
  </script>

</body>
</html>
