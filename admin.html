<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #22d3ee;
      font-size: 36px;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin: 5px;
      font-size: 14px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    .btn {
      background: #22d3ee;
      color: #020617;
    }

    .logout {
      background: #ef4444;
      color: white;
    }

    .login {
      max-width: 400px;
      background: #0f172a;
      padding: 25px;
      border-radius: 12px;
    }

    .filters {
      margin: 20px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #1e293b;
      color: #22d3ee;
    }

    tr:hover {
      background: #1e293b;
    }

    #adminPanel {
      display: none;
    }

    #error {
      color: #ef4444;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="login">
  <h1>Admin Login</h1>

  <input id="email" type="email" placeholder="E-mail">
  <input id="password" type="password" placeholder="Senha">

  <br>
  <button class="btn" onclick="login()">Entrar</button>

  <p id="error"></p>
</div>

<!-- PAINEL -->
<div id="adminPanel">
  <h1>Painel Administrativo</h1>

  <div class="filters">
    <input type="text" id="search" placeholder="Buscar nome ou email">

    <select id="filter">
      <option value="">Todas as vagas</option>
    </select>

    <button class="btn" onclick="loadContacts()">Atualizar</button>
    <button class="btn" onclick="exportCSV()">Exportar CSV</button>
    <button class="logout" onclick="logout()">Sair</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Data</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Telefone</th>
        <th>Vaga</th>
        <th>Mensagem</th>
      </tr>
    </thead>

    <tbody id="contactsTable">
      <tr><td colspan="6">Carregando...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const loginBox = document.getElementById("loginBox");
const adminPanel = document.getElementById("adminPanel");
const table = document.getElementById("contactsTable");
const errorBox = document.getElementById("error");

let contacts = [];

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    errorBox.innerText = "Login inválido";
    return;
  }

  loginBox.style.display = "none";
  adminPanel.style.display = "block";

  loadContacts();
}

// LOGOUT
async function logout() {
  await client.auth.signOut();
  location.reload();
}

// SESSION
async function checkSession() {
  const { data } = await client.auth.getSession();

  if (data.session) {
    loginBox.style.display = "none";
    adminPanel.style.display = "block";
    loadContacts();
  }
}

// CARREGAR DADOS
async function loadContacts() {
  const { data } = await client
    .from("contacts")
    .select("*")
    .order("created_at", { ascending: false });

  contacts = data || [];

  populateFilter();
  renderContacts();
}

// FILTRO
function populateFilter() {
  const filter = document.getElementById("filter");
  filter.innerHTML = `<option value="">Todas</option>`;

  const jobs = [...new Set(contacts.map(c => c.job_type))];

  jobs.forEach(j => {
    if (!j) return;
    const opt = document.createElement("option");
    opt.value = j;
    opt.textContent = j;
    filter.appendChild(opt);
  });
}

// RENDER
function renderContacts() {
  const search = document.getElementById("search").value.toLowerCase();
  const job = document.getElementById("filter").value;

  const filtered = contacts.filter(c =>
    (c.name?.toLowerCase().includes(search) ||
     c.email?.toLowerCase().includes(search)) &&
    (job === "" || c.job_type === job)
  );

  table.innerHTML = filtered.map(c => `
    <tr>
      <td>${new Date(c.created_at).toLocaleString()}</td>
      <td>${c.name}</td>
      <td>${c.email}</td>
      <td>${c.phone}</td>
      <td>${c.job_type || "-"}</td>
      <td>${c.message || "-"}</td>
    </tr>
  `).join("");
}

// CSV
function exportCSV() {
  let csv = "Data,Nome,Email,Telefone,Vaga,Mensagem\n";

  contacts.forEach(c => {
    csv += `"${new Date(c.created_at).toLocaleString()}","${c.name}","${c.email}","${c.phone}","${c.job_type}","${c.message}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "contatos.csv";
  a.click();
}

// EVENTOS
document.getElementById("search").addEventListener("input", renderContacts);
document.getElementById("filter").addEventListener("change", renderContacts);

// INIT
checkSession();
</script>

</body>
</html>
