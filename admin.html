<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: #0f172a;
      color: #fff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 1000px;
      background: #111827;
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #334155;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #1e293b;
      color: white;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    .logout {
      background: red;
      width: 150px;
      float: right;
    }

    .hidden {
      display: none;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #1e293b;
    }

    .status {
      margin-top: 10px;
      color: yellow;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- LOGIN -->
  <div id="loginBox">
    <h1>Login Admin</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Senha">

    <button id="loginBtn">Entrar</button>
    <p id="status" class="status"></p>
  </div>

  <!-- PAINEL -->
  <div id="adminBox" class="hidden">
    <button class="logout" id="logoutBtn">Sair</button>
    <h1>Mensagens</h1>

    <button id="refreshBtn">Atualizar</button>

    <div id="list"></div>
  </div>

</div>

<script>
const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
const TABLE_NAME = "message";

const loginBox = document.getElementById("loginBox");
const adminBox = document.getElementById("adminBox");
const status = document.getElementById("status");
const list = document.getElementById("list");

document.getElementById("loginBtn").onclick = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  status.innerText = "Entrando...";

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    status.innerText = error.message;
    return;
  }

  showAdmin();
};

document.getElementById("logoutBtn").onclick = async () => {
  await supabaseClient.auth.signOut();
  showLogin();
};

document.getElementById("refreshBtn").onclick = load;

function showAdmin() {
  loginBox.classList.add("hidden");
  adminBox.classList.remove("hidden");
  load();
}

function showLogin() {
  loginBox.classList.remove("hidden");
  adminBox.classList.add("hidden");
}

async function load() {
  list.innerHTML = "Carregando...";

  const { data, error } = await supabaseClient
    .from(TABLE_NAME)
    .select("*");

  if (error) {
    console.error(error);
    list.innerHTML = "Erro ao carregar: " + error.message;
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = "Nenhuma mensagem encontrada.";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Serviço</th>
          <th>Mensagem</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(msg => {
    html += `
      <tr>
        <td>${msg.name || ""}</td>
        <td>${msg.email || ""}</td>
        <td>${msg.phone || ""}</td>
        <td>${msg.job_type || ""}</td>
        <td>${msg.message || ""}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";

  list.innerHTML = html;
}

supabaseClient.auth.getSession().then(({ data }) => {
  if (data.session) showAdmin();
});
</script>

</body>
</html>
