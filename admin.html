<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Portfólio</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0f172a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }

    h1, h2 {
      margin-bottom: 20px;
      color: #38bdf8;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
    }

    input {
      background: #1e293b;
      color: #fff;
      border: 1px solid #334155;
    }

    button {
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .logout {
      background: #ef4444;
      color: #fff;
      max-width: 150px;
    }

    .hidden {
      display: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .message {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .status {
      margin-top: 10px;
      color: #facc15;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- LOGIN -->
    <div id="loginBox" class="card">
      <h1>Login Admin</h1>

      <input type="email" id="email" placeholder="E-mail" />
      <input type="password" id="password" placeholder="Senha" />

      <button id="loginBtn">Entrar</button>
      <p id="loginStatus" class="status"></p>
    </div>

    <!-- PAINEL -->
    <div id="adminBox" class="card hidden">
      <div class="topbar">
        <h2>Mensagens</h2>
        <button id="logoutBtn" class="logout">Sair</button>
      </div>

      <button id="refreshBtn">Atualizar</button>
      <div id="messagesList"></div>
    </div>

  </div>

  <script>
    // ✅ CONFIG CORRETA
    const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
    const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const TABLE_NAME = "message";

    const loginBox = document.getElementById("loginBox");
    const adminBox = document.getElementById("adminBox");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const loginStatus = document.getElementById("loginStatus");
    const messagesList = document.getElementById("messagesList");

    function showLogin() {
      loginBox.classList.remove("hidden");
      adminBox.classList.add("hidden");
    }

    function showAdmin() {
      loginBox.classList.add("hidden");
      adminBox.classList.remove("hidden");
      loadMessages();
    }

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();

      if (data.session) {
        showAdmin();
      } else {
        showLogin();
      }
    }

    loginBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      loginStatus.textContent = "Entrando...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        loginStatus.textContent = "Erro: " + error.message;
        return;
      }

      showAdmin();
    });

    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      showLogin();
    });

    refreshBtn.addEventListener("click", loadMessages);

    async function loadMessages() {
      messagesList.innerHTML = "Carregando...";

      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        messagesList.innerHTML = "Erro ao carregar";
        return;
      }

      messagesList.innerHTML = "";

      data.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML = `
          <p><strong>Nome:</strong> ${msg.name}</p>
          <p><strong>Email:</strong> ${msg.email}</p>
          <p><strong>Mensagem:</strong> ${msg.message}</p>
        `;
        messagesList.appendChild(div);
      });
    }

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (session) showAdmin();
      else showLogin();
    });

    checkSession();
  </script>
</body>
</html>
