<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Maxy Tedesco</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #22d3ee;
      font-size: 42px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #334155;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #1e293b;
      color: #22d3ee;
    }

    tr:hover {
      background: #1e293b;
    }

    .denied {
      color: #ff6b6b;
      font-size: 32px;
      margin-top: 80px;
      text-align: center;
    }

    .logout {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<script>
  const ADMIN_USER = "maxytedesco";
  const ADMIN_PASSWORD = "050118";

  const user = prompt("Digite o usuário do administrador:");
  const password = prompt("Digite a senha do administrador:");

  if (user !== ADMIN_USER || password !== ADMIN_PASSWORD) {
    document.body.innerHTML = '<h1 class="denied">Acesso negado</h1>';
    throw new Error("Acesso negado");
  }
</script>

<h1>Painel Administrativo</h1>
<p>Contatos recebidos pelo portfólio.</p>

<button class="logout" onclick="window.location.href='index.html'">Sair</button>

<table>
  <thead>
    <tr>
      <th>Data/Hora</th>
      <th>Nome</th>
      <th>E-mail</th>
      <th>Telefone</th>
      <th>Tipo de vaga</th>
      <th>Mensagem</th>
    </tr>
  </thead>

  <tbody id="contactsTable">
    <tr><td colspan="6">Carregando contatos...</td></tr>
  </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);
const table = document.getElementById("contactsTable");

async function loadContacts() {
  const { data, error } = await client
    .from("contacts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    table.innerHTML = `<tr><td colspan="6">Erro: ${error.message}</td></tr>`;
    return;
  }

  if (!data || data.length === 0) {
    table.innerHTML = `<tr><td colspan="6">Nenhum contato encontrado.</td></tr>`;
    return;
  }

  table.innerHTML = data.map(c => `
    <tr>
      <td>${c.created_at ? new Date(c.created_at).toLocaleString("pt-BR") : ""}</td>
      <td>${c.name || ""}</td>
      <td>${c.email || ""}</td>
      <td>${c.phone || ""}</td>
      <td>${c.job_type || ""}</td>
      <td>${c.message || ""}</td>
    </tr>
  `).join("");
}

loadContacts();
</script>

</body>
</html>
