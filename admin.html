<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #222;
    }

    .login-container,
    .admin-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      border: none;
      background: #111827;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .top-bar button {
      width: auto;
      padding: 10px 18px;
      background: #dc2626;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 15px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111827;
      color: white;
    }

    tr:hover {
      background: #f9fafb;
    }

    .status {
      padding: 6px 10px;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
      text-transform: uppercase;
    }

    .status-novo {
      background: #dc2626;
    }

    .status-lido {
      background: #f59e0b;
    }

    .status-respondido {
      background: #16a34a;
    }

    .action-btn {
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
      margin-right: 5px;
      background: #2563eb;
    }

    .select-status {
      min-width: 120px;
      padding: 8px;
      margin: 0;
    }

    .empty {
      background: white;
      padding: 30px;
      text-align: center;
      border-radius: 12px;
      color: #666;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 999;
    }

    .modal {
      background: white;
      width: 100%;
      max-width: 600px;
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      position: relative;
    }

    .modal h2 {
      margin-bottom: 10px;
    }

    .modal p {
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .close-modal {
      position: absolute;
      right: 15px;
      top: 15px;
      background: #dc2626;
      width: auto;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .error {
      color: #dc2626;
      margin-top: 10px;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 25px;
      color: #666;
    }

    @media (max-width: 768px) {
      .filters {
        grid-template-columns: 1fr;
      }

      table {
        display: block;
        overflow-x: auto;
      }

      .top-bar {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <div id="loginScreen" class="login-container">
    <div class="login-box">
      <h1>Admin</h1>
      <p>Acesse o painel administrativo.</p>

      <input type="password" id="passwordInput" placeholder="Digite a senha" />
      <button onclick="login()">Entrar</button>

      <div id="loginError" class="error"></div>
    </div>
  </div>

  <div id="adminScreen" class="admin-container" style="display:none;">
    <div class="top-bar">
      <div>
        <h1>Painel de Mensagens</h1>
        <p>Gerencie as mensagens recebidas pelo site.</p>
      </div>
      <button onclick="logout()">Sair</button>
    </div>

    <div class="filters">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Buscar por nome, e-mail, telefone ou mensagem..." 
        oninput="applyFilters()" 
      />

      <select id="statusFilter" onchange="applyFilters()">
        <option value="todos">Todos os status</option>
        <option value="novo">Novo</option>
        <option value="lido">Lido</option>
        <option value="respondido">Respondido</option>
      </select>
    </div>

    <div id="messagesArea" class="loading">Carregando mensagens...</div>
  </div>

  <div id="messageModal" class="modal-overlay">
    <div class="modal">
      <button class="close-modal" onclick="closeModal()">X</button>
      <h2 id="modalTitle">Mensagem</h2>
      <p><strong>Nome:</strong> <span id="modalName"></span></p>
      <p><strong>E-mail:</strong> <span id="modalEmail"></span></p>
      <p><strong>Telefone:</strong> <span id="modalPhone"></span></p>
      <hr>
      <p id="modalMessage"></p>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";
    const ADMIN_PASSWORD = "LiSa-2011";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let allMessages = [];

    document.addEventListener("DOMContentLoaded", () => {
      const logged = localStorage.getItem("admin_logged");

      if (logged === "true") {
        showAdmin();
      }
    });

    function login() {
      const password = document.getElementById("passwordInput").value;
      const error = document.getElementById("loginError");

      if (password === ADMIN_PASSWORD) {
        localStorage.setItem("admin_logged", "true");
        error.textContent = "";
        showAdmin();
      } else {
        error.textContent = "Senha incorreta.";
      }
    }

    function logout() {
      localStorage.removeItem("admin_logged");
      document.getElementById("adminScreen").style.display = "none";
      document.getElementById("loginScreen").style.display = "block";
    }

    function showAdmin() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("adminScreen").style.display = "block";
      loadMessages();
    }

    async function loadMessages() {
      const area = document.getElementById("messagesArea");
      area.innerHTML = "Carregando mensagens...";

      const { data, error } = await supabaseClient
        .from("message")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        area.innerHTML = "<div class='empty'>Erro ao carregar mensagens.</div>";
        return;
      }

      allMessages = data || [];
      renderMessages(allMessages);
    }

    function applyFilters() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const status = document.getElementById("statusFilter").value;

      let filtered = allMessages.filter(msg => {
        const name = (msg.name || "").toLowerCase();
        const email = (msg.email || "").toLowerCase();
        const phone = (msg.phone || "").toLowerCase();
        const message = (msg.message || "").toLowerCase();
        const msgStatus = msg.status || "novo";

        const matchesSearch =
          name.includes(search) ||
          email.includes(search) ||
          phone.includes(search) ||
          message.includes(search);

        const matchesStatus =
          status === "todos" || msgStatus === status;

        return matchesSearch && matchesStatus;
      });

      renderMessages(filtered);
    }

    function renderMessages(messages) {
      const area = document.getElementById("messagesArea");

      if (!messages.length) {
        area.innerHTML = "<div class='empty'>Nenhuma mensagem encontrada.</div>";
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
      `;

      messages.forEach(msg => {
        const status = msg.status || "novo";

        html += `
          <tr>
            <td>${formatDate(msg.created_at)}</td>
            <td>${escapeHtml(msg.name || "-")}</td>
            <td>${escapeHtml(msg.email || "-")}</td>
            <td>${escapeHtml(msg.phone || "-")}</td>
            <td>
              <span class="status status-${status}">
                ${status}
              </span>
              <select class="select-status" onchange="updateStatus('${msg.id}', this.value)">
                <option value="novo" ${status === "novo" ? "selected" : ""}>Novo</option>
                <option value="lido" ${status === "lido" ? "selected" : ""}>Lido</option>
                <option value="respondido" ${status === "respondido" ? "selected" : ""}>Respondido</option>
              </select>
            </td>
            <td>
              <button class="action-btn" onclick='openModal(${JSON.stringify(msg)})'>
                Ver mensagem
              </button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      area.innerHTML = html;
    }

    async function updateStatus(id, status) {
      const { error } = await supabaseClient
        .from("message")
        .update({ status: status })
        .eq("id", id);

      if (error) {
        console.error(error);
        alert("Erro ao atualizar status. Verifique se a coluna status existe no Supabase.");
        return;
      }

      allMessages = allMessages.map(msg => {
        if (String(msg.id) === String(id)) {
          return { ...msg, status: status };
        }
        return msg;
      });

      applyFilters();
    }

    function openModal(msg) {
      document.getElementById("modalTitle").textContent = "Detalhes da Mensagem";
      document.getElementById("modalName").textContent = msg.name || "-";
      document.getElementById("modalEmail").textContent = msg.email || "-";
      document.getElementById("modalPhone").textContent = msg.phone || "-";
      document.getElementById("modalMessage").textContent = msg.message || "-";

      document.getElementById("messageModal").style.display = "flex";
    }

    function closeModal() {
      document.getElementById("messageModal").style.display = "none";
    }

    function formatDate(dateString) {
      if (!dateString) return "-";

      const date = new Date(dateString);

      return date.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>

</body>
</html>
