<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background: #020617;
  color: white;
  font-family: Arial;
  padding: 30px;
}

h1 {
  color: #22d3ee;
}

.top-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.logout {
  background: red;
  color: white;
}

.export {
  background: #22d3ee;
  color: black;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #1e293b;
}

th {
  color: #22d3ee;
  text-align: left;
}
</style>
</head>

<body>

<h1>Painel Administrativo</h1>

<div class="top-bar">
  <input type="text" id="search" placeholder="Buscar nome ou email">
  
  <select id="filter">
    <option value="">Todos</option>
  </select>

  <button class="export" onclick="exportCSV()">Exportar CSV</button>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<table>
  <thead>
    <tr>
      <th>Data</th>
      <th>Nome</th>
      <th>Email</th>
      <th>Telefone</th>
      <th>Vaga</th>
      <th>Mensagem</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const supabaseUrl = "https://kdgjfzsimvtgckialfpe.supabase.co";
const supabaseKey = "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let contacts = [];

async function loadData() {
  const { data, error } = await supabase
    .from("contacts")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Erro ao carregar");
    return;
  }

  contacts = data;
  populateFilter();
  render();
}

function populateFilter() {
  const types = [...new Set(contacts.map(c => c.job_type))];
  const filter = document.getElementById("filter");

  types.forEach(t => {
    if (!t) return;
    const opt = document.createElement("option");
    opt.value = t;
    opt.textContent = t;
    filter.appendChild(opt);
  });
}

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  const table = document.getElementById("table");
  table.innerHTML = "";

  contacts
    .filter(c =>
      (!filter || c.job_type === filter) &&
      (c.name.toLowerCase().includes(search) ||
       c.email.toLowerCase().includes(search))
    )
    .forEach(c => {
      const row = `
        <tr>
          <td>${new Date(c.created_at).toLocaleString()}</td>
          <td>${c.name}</td>
          <td>${c.email}</td>
          <td>${c.phone}</td>
          <td>${c.job_type || "-"}</td>
          <td>${c.message || "-"}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("filter").addEventListener("change", render);

function exportCSV() {
  let csv = "Data,Nome,Email,Telefone,Vaga,Mensagem\n";

  contacts.forEach(c => {
    csv += `"${new Date(c.created_at).toLocaleString()}","${c.name}","${c.email}","${c.phone}","${c.job_type}","${c.message}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "contatos.csv";
  a.click();
}

function logout() {
  localStorage.removeItem("admin");
  location.href = "/";
}

if (!localStorage.getItem("admin")) {
  const user = prompt("USUARIO:");
  const pass = prompt("SENHA:");

  if (user !== "ADMIN" || pass !== "123456") {
    alert("Acesso negado");
    location.href = "/";
  } else {
    localStorage.setItem("admin", "true");
  }
}

loadData();
</script>

</body>
</html>
