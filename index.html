<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxy Tedesco</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

html {
  scroll-behavior: smooth;
}

body {
  background:#020617;
  color:#fff;
}

/* NAVBAR */
nav {
  position:fixed;
  top:0;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(2,6,23,0.6);
  backdrop-filter:blur(10px);
  z-index:999;
}

nav a {
  margin-left:20px;
  text-decoration:none;
  color:#cbd5e1;
  font-weight:bold;
}

nav a:hover {
  color:#22d3ee;
}

/* HERO */
.hero {
  height:100vh;
  background:
    linear-gradient(rgba(2,6,23,0.7), rgba(2,6,23,0.9)),
    url("hero.jpg");
  background-size:cover;
  background-position:center right;
  display:flex;
  align-items:center;
  padding:0 60px;
}

.hero-content {
  max-width:600px;
}

.hero h1 {
  font-size:60px;
  margin-bottom:20px;
}

.hero h2 {
  color:#cbd5e1;
  margin-bottom:30px;
}

/* BUTTON */
.btn {
  padding:15px 30px;
  background:#22d3ee;
  color:#000;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

/* SECTIONS */
section {
  padding:100px 60px;
}

/* CONTACT */
#contact {
  scroll-margin-top:100px;
}

.contact-container {
  max-width:700px;
  margin:auto;
  text-align:center;
}

.contact-form {
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  margin-top:20px;
  border:1px solid rgba(255,255,255,0.05);

  opacity:0;
  transform:translateY(30px);
  transition:0.6s;
}

.contact-form.show {
  opacity:1;
  transform:translateY(0);
}

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.contact-form input,
.contact-form textarea {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

.contact-form textarea {
  min-height:120px;
}

.contact-form .btn {
  width:100%;
}

/* MESSAGE */
.message-box {
  display:none;
  margin-top:15px;
  padding:12px;
  border-radius:10px;
}

.success {
  display:block;
  background:rgba(34,197,94,0.2);
  color:#22c55e;
}

.error {
  display:block;
  background:rgba(239,68,68,0.2);
  color:#ef4444;
}

/* RESPONSIVO */
@media(max-width:800px){
  nav {padding:15px;}
  .hero {padding:20px;}
  .form-grid {grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div><strong>Maxy</strong></div>
  <div>
    <a href="#contact">Contato</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Soluções que geram resultados</h1>
    <h2>Transformando tecnologia em resultados reais</h2>
    <a href="#contact" class="btn">Entrar em contato</a>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="contact-container">
    <h2>Contato</h2>

    <form id="contactForm" class="contact-form">
      <div class="form-grid">
        <input name="name" placeholder="Nome" required>
        <input name="email" type="email" placeholder="Email" required>
      </div>

      <div class="form-grid">
        <input name="phone" placeholder="Telefone">
        <input name="job_type" placeholder="Tipo de oportunidade" required>
      </div>

      <textarea name="message" placeholder="Mensagem"></textarea>

      <button id="submitBtn" class="btn">Enviar mensagem</button>

      <div id="formMessage" class="message-box"></div>
    </form>
  </div>
</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://kdgjfzsimvtgckialfpe.supabase.co",
  "sb_publishable_7cJCCvrit6oMwZzJwugb6g_tgUlXw4L"
);

const form = document.getElementById("contactForm");
const btn = document.getElementById("submitBtn");
const msg = document.getElementById("formMessage");

function showMessage(type,text){
  msg.className="message-box "+type;
  msg.innerText=text;
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  btn.innerText="Enviando...";
  btn.disabled=true;

  const data={
    name:form.name.value,
    email:form.email.value,
    phone:form.phone.value,
    job_type:form.job_type.value,
    message:form.message.value
  };

  const {error}=await client.from("contacts").insert([data]);

  if(error){
    showMessage("error","Erro ao enviar");
    btn.disabled=false;
    btn.innerText="Enviar mensagem";
    return;
  }

  await fetch("/api/send-email",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  form.reset();
  showMessage("success","Mensagem enviada com sucesso!");
  btn.disabled=false;
  btn.innerText="Enviar mensagem";
});

/* ANIMAÇÃO AO CHEGAR NO FORM */
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      document.querySelector(".contact-form").classList.add("show");
    }
  });
},{threshold:0.3});

observer.observe(document.querySelector(".contact-form"));
</script>

</body>
</html>
