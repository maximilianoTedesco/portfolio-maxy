<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maxy Tedesco | Tecnologia, Dados e IA</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: #020617;
  color: #ffffff;
}

p {
  color: #cbd5e1;
  line-height: 1.7;
}

/* NAVBAR MAIS FINA */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(2, 6, 23, 0.75);
  backdrop-filter: blur(10px);
  z-index: 999;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #cbd5e1;
  font-weight: bold;
  font-size: 14px;
  transition: 0.3s;
}

nav a:hover {
  color: #22d3ee;
}

/* HERO */
.hero {
  height: 100vh;
  background:
    linear-gradient(
      to right,
      rgba(2,6,23,0.65) 0%,
      rgba(2,6,23,0.55) 30%,
      rgba(2,6,23,0.25) 60%,
      rgba(2,6,23,0.05) 100%
    ),
    url("hero.jpg");

  background-size: cover;
  background-position: right center;

  display: flex;
  align-items: center;
  padding: 0 60px;
}

.hero-content {
  max-width: 520px;
}

.hero h1 {
  font-size: clamp(42px, 6vw, 70px);
  margin-bottom: 20px;
  text-shadow: 0 10px 40px rgba(0,0,0,0.7);
}

.hero h2 {
  font-size: 22px;
  color: #e2e8f0;
  margin-bottom: 30px;
  text-shadow: 0 5px 20px rgba(0,0,0,0.7);
}

/* BOTÃO */
.btn {
  padding: 14px 28px;
  background: #22d3ee;
  color: #020617;
  border-radius: 12px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(34,211,238,0.25);
}

/* SECTIONS */
section {
  padding: 100px 40px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* SOBRE */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 30px;
}

.about-card {
  background: #0f172a;
  padding: 30px;
  border-radius: 20px;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  background: #0f172a;
  padding: 25px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(34,211,238,0.3);
}

/* PARALLAX */
.parallax {
  min-height: 360px;
  background-attachment: fixed;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  position: relative;
}

.parallax::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(2,6,23,0.88), rgba(2,6,23,0.55));
  z-index: 1;
}

.parallax-content {
  position: relative;
  z-index: 2;
  max-width: 750px;
}

.parallax-tech {
  background-image: url("https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1920");
}

.parallax-data {
  background-image: url("https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1920");
}

/* FORM */
.contact-container {
  max-width: 700px;
  margin: auto;
  text-align: center;
}

.contact-form {
  background: #0f172a;
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.form-group {
  display: flex;
  flex-direction: column;
  text-align: left;
}

.form-group label {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 6px;
}

/* inputs */
.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
}

.contact-form textarea {
  min-height: 120px;
}

.contact-form .btn {
  width: 100%;
  margin-top: 15px;
}

/* MENSAGEM */
.message-box {
  display: none;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
}

.success {
  display: block;
  background: rgba(34,197,94,0.2);
  color: #22c55e;
}

.error {
  display: block;
  background: rgba(239,68,68,0.2);
  color: #ef4444;
}

/* RESPONSIVO */
@media(max-width: 900px) {
  nav { padding: 10px 20px; }
  .hero { padding: 0 20px; }
  .about-grid, .grid, .form-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">Maxy</div>
  <div>
    <a href="#about">Sobre</a>
    <a href="#services">Serviços</a>
    <a href="#portfolio">Projetos</a>
    <a href="#contact">Contato</a>
    <a href="admin.html">Admin</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Soluções que geram resultados</h1>
    <h2>Transformando tecnologia em resultados reais</h2>
    <a href="#contact" class="btn">Entrar em contato</a>
  </div>
</section>

<section id="contact">
  <div class="contact-container">

    <h2>Contato</h2>

    <form id="contactForm" class="contact-form">

      <div class="form-grid">

        <div class="form-group">
          <label>Nome</label>
          <input name="name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input name="email" type="email" required />
        </div>

      </div>

      <div class="form-grid">

        <div class="form-group">
          <label>Telefone / WhatsApp</label>
          <input name="phone" />
        </div>

        <div class="form-group">
          <label>Tipo de oportunidade</label>
          <input name="job_type" required />
        </div>

      </div>

      <div class="form-group">
        <label>Mensagem</label>
        <textarea name="message"></textarea>
      </div>

      <button id="submitBtn" class="btn">Enviar mensagem</button>

      <div id="formMessage" class="message-box"></div>

    </form>

  </div>
</section>

</body>
</html>
